# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: vm-perf-drift-demo
metadata:
  template: vm-perf-drift-demo@1.0.0

# Infrastructure provisioned via Bicep (infra/main.bicep)
# azd up provisions: Resource Group, VMs (Linux), Log Analytics Workspace,
# Azure Monitor Alert Rules, SRE Agent (Microsoft.App/agents), role assignments.
# Post-deploy script configures: skills, hooks, scheduled tasks.

hooks:
  postprovision:
    posix:
      shell: sh
      run: |
        scripts/post-deploy.sh && scripts/install-app.sh
      interactive: true
    windows:
      shell: pwsh
      run: |
        if (-not (Get-Command bash -ErrorAction SilentlyContinue)) {
          Write-Error "bash not found. Install Git for Windows (https://git-scm.com/download/win)."
          exit 1
        }
        bash -c "scripts/post-deploy.sh && scripts/install-app.sh"
      interactive: true
