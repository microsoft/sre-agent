<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 600" font-family="Segoe UI, -apple-system, sans-serif">
  <defs>
    <filter id="s" x="-2%" y="-4%" width="104%" height="112%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="820" height="600" fill="#fff"/>

  <!-- Title -->
  <text x="410" y="30" text-anchor="middle" font-size="15" font-weight="700" fill="#1B1B1B">Starter Lab Architecture</text>

  <!-- ═══════════ SRE Agent ═══════════ -->
  <g filter="url(#s)">
    <rect x="260" y="48" width="300" height="44" rx="8" fill="#0078D4"/>
    <text x="410" y="72" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Azure SRE Agent</text>
    <text x="410" y="85" text-anchor="middle" font-size="9" fill="#B3D7FF">sre.azure.com</text>
  </g>

  <!-- ═══════════ CONTEXT ═══════════ -->
  <text x="30" y="122" font-size="9" font-weight="600" fill="#9CA3AF" letter-spacing="1">CONTEXT</text>
  <rect x="30" y="130" width="760" height="56" rx="6" fill="#FAFAFA" stroke="#E5E7EB" stroke-width="1"/>

  <rect x="42" y="140" width="170" height="36" rx="5" fill="#fff" stroke="#8661C5" stroke-width="1" filter="url(#s)"/>
  <text x="127" y="162" text-anchor="middle" font-size="10" font-weight="600" fill="#5C2D91">Knowledge Base</text>

  <rect x="224" y="140" width="170" height="36" rx="5" fill="#fff" stroke="#8661C5" stroke-width="1" filter="url(#s)"/>
  <text x="309" y="162" text-anchor="middle" font-size="10" font-weight="600" fill="#5C2D91">Code Repository</text>

  <rect x="406" y="140" width="190" height="36" rx="5" fill="#fff" stroke="#8661C5" stroke-width="1" filter="url(#s)"/>
  <text x="501" y="162" text-anchor="middle" font-size="10" font-weight="600" fill="#5C2D91">Azure Observability</text>

  <rect x="608" y="140" width="170" height="36" rx="5" fill="#fff" stroke="#8661C5" stroke-width="1" filter="url(#s)"/>
  <text x="693" y="162" text-anchor="middle" font-size="10" font-weight="600" fill="#5C2D91">RBAC Permissions</text>

  <!-- connector -->
  <line x1="410" y1="92" x2="410" y2="130" stroke="#8661C5" stroke-width="1"/>

  <!-- ═══════════ AUTOMATION ═══════════ -->
  <text x="30" y="216" font-size="9" font-weight="600" fill="#9CA3AF" letter-spacing="1">AUTOMATION</text>
  <rect x="30" y="224" width="760" height="56" rx="6" fill="#FAFAFA" stroke="#E5E7EB" stroke-width="1"/>

  <rect x="42" y="234" width="380" height="36" rx="5" fill="#fff" stroke="#107C10" stroke-width="1" filter="url(#s)"/>
  <text x="232" y="256" text-anchor="middle" font-size="10" font-weight="600" fill="#107C10">Azure Monitor Alerts → Response Plan → Agent</text>

  <rect x="434" y="234" width="344" height="36" rx="5" fill="#fff" stroke="#107C10" stroke-width="1" filter="url(#s)"/>
  <text x="606" y="256" text-anchor="middle" font-size="10" font-weight="600" fill="#107C10">Scheduled Task (triage issues every 12h)</text>

  <line x1="410" y1="186" x2="410" y2="224" stroke="#107C10" stroke-width="1"/>

  <!-- ═══════════ SAMPLE APP ═══════════ -->
  <text x="30" y="312" font-size="9" font-weight="600" fill="#9CA3AF" letter-spacing="1">SAMPLE APP</text>
  <rect x="30" y="320" width="760" height="50" rx="6" fill="#F0F7FF" stroke="#0078D4" stroke-width="1"/>

  <rect x="46" y="332" width="180" height="28" rx="5" fill="#fff" stroke="#0078D4" stroke-width="1" filter="url(#s)"/>
  <text x="136" y="350" text-anchor="middle" font-size="10" font-weight="600" fill="#0078D4">Grubify Frontend</text>

  <text x="238" y="350" font-size="11" fill="#9CA3AF">→</text>

  <rect x="252" y="332" width="180" height="28" rx="5" fill="#fff" stroke="#0078D4" stroke-width="1" filter="url(#s)"/>
  <text x="342" y="350" text-anchor="middle" font-size="10" font-weight="600" fill="#0078D4">Grubify API (.NET)</text>

  <text x="444" y="350" font-size="11" fill="#9CA3AF">→</text>

  <rect x="458" y="332" width="320" height="28" rx="5" fill="#fff" stroke="#FF8C00" stroke-width="1" filter="url(#s)"/>
  <text x="618" y="350" text-anchor="middle" font-size="10" font-weight="600" fill="#E65100">App Insights + Log Analytics + Alerts</text>

  <!-- telemetry arrow -->
  <path d="M 618 332 L 618 310 L 800 310 L 800 80 L 560 80" stroke="#FF8C00" stroke-width="1" fill="none" stroke-dasharray="4,3"/>
  <polygon points="560,80 567,76 567,84" fill="#FF8C00"/>
  <text x="802" y="200" font-size="7" fill="#E65100" transform="rotate(90,802,200)">telemetry</text>

  <line x1="410" y1="280" x2="410" y2="320" stroke="#0078D4" stroke-width="1"/>

  <!-- ═══════════ LAB SCENARIOS ═══════════ -->
  <text x="30" y="402" font-size="9" font-weight="600" fill="#9CA3AF" letter-spacing="1">LAB SCENARIOS</text>

  <g filter="url(#s)">
    <rect x="30" y="412" width="240" height="72" rx="6" fill="#fff" stroke="#EF4444" stroke-width="1.5"/>
    <rect x="30" y="412" width="240" height="22" rx="6" fill="#FEE2E2"/>
    <rect x="30" y="428" width="240" height="6" fill="#FEE2E2"/>
    <text x="150" y="428" text-anchor="middle" font-size="10" font-weight="700" fill="#DC2626">1 · IT Operations</text>
    <text x="150" y="451" text-anchor="middle" font-size="9" fill="#374151">Break app → alert → investigate → fix</text>
    <text x="150" y="475" text-anchor="middle" font-size="8" fill="#9CA3AF">No GitHub required</text>
  </g>

  <g filter="url(#s)">
    <rect x="290" y="412" width="240" height="72" rx="6" fill="#fff" stroke="#0078D4" stroke-width="1.5"/>
    <rect x="290" y="412" width="240" height="22" rx="6" fill="#E8F1FB"/>
    <rect x="290" y="428" width="240" height="6" fill="#E8F1FB"/>
    <text x="410" y="428" text-anchor="middle" font-size="10" font-weight="700" fill="#0078D4">2 · Developer</text>
    <text x="410" y="451" text-anchor="middle" font-size="9" fill="#374151">Source code search · root cause</text>
    <text x="410" y="475" text-anchor="middle" font-size="8" fill="#9CA3AF">Requires GitHub</text>
  </g>

  <g filter="url(#s)">
    <rect x="550" y="412" width="240" height="72" rx="6" fill="#fff" stroke="#107C10" stroke-width="1.5"/>
    <rect x="550" y="412" width="240" height="22" rx="6" fill="#E8F5E8"/>
    <rect x="550" y="428" width="240" height="6" fill="#E8F5E8"/>
    <text x="670" y="428" text-anchor="middle" font-size="10" font-weight="700" fill="#107C10">3 · Workflow Automation</text>
    <text x="670" y="451" text-anchor="middle" font-size="9" fill="#374151">Auto-triage issues on schedule</text>
    <text x="670" y="475" text-anchor="middle" font-size="8" fill="#9CA3AF">Requires GitHub</text>
  </g>

  <!-- ═══════════ GETTING STARTED ═══════════ -->
  <text x="30" y="520" font-size="9" font-weight="600" fill="#9CA3AF" letter-spacing="1">GETTING STARTED</text>

  <rect x="80" y="533" width="130" height="40" rx="18" fill="#0078D4" filter="url(#s)"/>
  <text x="145" y="550" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">❶  azd up</text>
  <text x="145" y="563" text-anchor="middle" font-size="7" fill="#B3D7FF">Deploy infra + app</text>

  <text x="222" y="555" font-size="12" fill="#CBD5E1">→</text>

  <rect x="236" y="533" width="160" height="40" rx="18" fill="#0078D4" filter="url(#s)"/>
  <text x="316" y="550" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">❷  Open Agent</text>
  <text x="316" y="563" text-anchor="middle" font-size="7" fill="#B3D7FF">in SRE Portal</text>

  <text x="408" y="555" font-size="12" fill="#CBD5E1">→</text>

  <rect x="422" y="533" width="130" height="40" rx="18" fill="#107C10" filter="url(#s)"/>
  <text x="487" y="550" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">❸  Onboard Team</text>
  <text x="487" y="563" text-anchor="middle" font-size="7" fill="#B8E6B8">Team onboarding chat</text>

  <text x="564" y="555" font-size="12" fill="#CBD5E1">→</text>

  <rect x="578" y="533" width="160" height="40" rx="18" fill="#EF4444" filter="url(#s)"/>
  <text x="658" y="550" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">❹  Break it!</text>
  <text x="658" y="563" text-anchor="middle" font-size="7" fill="#FECACA">Run lab scenarios</text>
</svg>
