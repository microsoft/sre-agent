<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 680" font-family="Segoe UI, -apple-system, sans-serif">
  <defs>
    <filter id="s" x="-2%" y="-4%" width="104%" height="112%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
    <marker id="ab" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#0078d4"/></marker>
    <marker id="ag" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#008272"/></marker>
  </defs>
  <rect width="960" height="680" rx="12" fill="#f8f9fa"/>
  <text x="480" y="28" text-anchor="middle" font-size="17" font-weight="600" fill="#1a1a1a">Azure SRE Agent — Starter Lab Architecture</text>

  <!-- Resource Group -->
  <rect x="15" y="42" width="930" height="295" rx="10" fill="none" stroke="#0078d4" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="30" y="60" font-size="11" fill="#0078d4" font-weight="600">Azure Resource Group (rg-sre-lab)</text>

  <!-- Grubify App -->
  <rect x="30" y="72" width="200" height="120" rx="8" fill="#fff" stroke="#5c2d91" stroke-width="1.5" filter="url(#s)"/>
  <text x="130" y="94" text-anchor="middle" font-size="12" font-weight="700" fill="#5c2d91">Grubify App</text>
  <rect x="42" y="102" width="176" height="18" rx="3" fill="#f3e8ff" stroke="#5c2d91" stroke-width="0.7"/>
  <text x="130" y="115" text-anchor="middle" font-size="9" fill="#5c2d91">API (Container Apps)</text>
  <rect x="42" y="124" width="176" height="18" rx="3" fill="#f3e8ff" stroke="#5c2d91" stroke-width="0.7"/>
  <text x="130" y="137" text-anchor="middle" font-size="9" fill="#5c2d91">Frontend (Container Apps)</text>
  <rect x="42" y="146" width="176" height="18" rx="3" fill="#f3e8ff" stroke="#5c2d91" stroke-width="0.7"/>
  <text x="130" y="159" text-anchor="middle" font-size="9" fill="#5c2d91">Cart API (memory leak target)</text>

  <!-- Monitoring -->
  <rect x="270" y="72" width="200" height="75" rx="8" fill="#fff" stroke="#008272" stroke-width="1.5" filter="url(#s)"/>
  <text x="370" y="94" text-anchor="middle" font-size="12" font-weight="700" fill="#008272">Azure Monitor</text>
  <text x="370" y="112" text-anchor="middle" font-size="9" fill="#666">HTTP 5xx alert → auto-flow</text>
  <text x="370" y="126" text-anchor="middle" font-size="9" fill="#666">Log Analytics + App Insights</text>
  <line x1="230" y1="110" x2="268" y2="110" stroke="#008272" stroke-width="1.2" marker-end="url(#ag)"/>

  <!-- SRE Agent -->
  <rect x="510" y="72" width="420" height="250" rx="10" fill="#e8f4fd" stroke="#0078d4" stroke-width="1.5" filter="url(#s)"/>
  <text x="720" y="94" text-anchor="middle" font-size="14" font-weight="700" fill="#0078d4">Azure SRE Agent</text>

  <rect x="524" y="106" width="195" height="20" rx="4" fill="#fff" stroke="#0078d4" stroke-width="0.8"/>
  <text x="621" y="120" text-anchor="middle" font-size="9" fill="#333">📚 http-500-errors.md</text>
  <rect x="724" y="106" width="195" height="20" rx="4" fill="#fff" stroke="#0078d4" stroke-width="0.8"/>
  <text x="821" y="120" text-anchor="middle" font-size="9" fill="#333">📚 grubify-architecture.md</text>

  <rect x="524" y="132" width="195" height="20" rx="4" fill="#fff" stroke="#107c10" stroke-width="0.8"/>
  <text x="621" y="146" text-anchor="middle" font-size="9" fill="#333">🤖 incident-handler</text>
  <rect x="724" y="132" width="195" height="20" rx="4" fill="#fff" stroke="#107c10" stroke-width="0.8"/>
  <text x="821" y="146" text-anchor="middle" font-size="9" fill="#333">🤖 code-analyzer</text>

  <rect x="524" y="158" width="195" height="20" rx="4" fill="#fff" stroke="#107c10" stroke-width="0.8"/>
  <text x="621" y="172" text-anchor="middle" font-size="9" fill="#333">🤖 issue-triager</text>
  <rect x="724" y="158" width="195" height="20" rx="4" fill="#fff" stroke="#008272" stroke-width="0.8"/>
  <text x="821" y="172" text-anchor="middle" font-size="9" fill="#333">⏰ triage (every 12h)</text>

  <rect x="524" y="184" width="395" height="20" rx="4" fill="#fff" stroke="#107c10" stroke-width="0.8"/>
  <text x="721" y="198" text-anchor="middle" font-size="9" fill="#333">🔧 SearchMemory · AzCli · KQL · PlotChart · GitHub tools</text>

  <rect x="524" y="210" width="195" height="20" rx="4" fill="#fff" stroke="#008272" stroke-width="0.8"/>
  <text x="621" y="224" text-anchor="middle" font-size="9" fill="#333">🚨 Response Plan → Monitor</text>
  <rect x="724" y="210" width="195" height="20" rx="4" fill="#fff" stroke="#333" stroke-width="0.8"/>
  <text x="821" y="224" text-anchor="middle" font-size="9" fill="#333">📂 GitHub: grubify (optional)</text>

  <rect x="524" y="236" width="395" height="20" rx="4" fill="#fff" stroke="#5c2d91" stroke-width="0.8"/>
  <text x="721" y="250" text-anchor="middle" font-size="9" fill="#333">🔐 Managed Identity · GitHub OAuth · DevOps + Python tools</text>

  <!-- Arrow: Monitor to Agent -->
  <line x1="470" y1="110" x2="508" y2="110" stroke="#0078d4" stroke-width="1.5" marker-end="url(#ab)"/>
  <text x="488" y="103" font-size="8" fill="#0078d4">alerts</text>

  <!-- Identity + RBAC -->
  <rect x="30" y="210" width="200" height="40" rx="6" fill="#fff" stroke="#107c10" stroke-width="1" filter="url(#s)"/>
  <text x="130" y="230" text-anchor="middle" font-size="9" font-weight="600" fill="#107c10">Managed Identity</text>
  <text x="130" y="242" text-anchor="middle" font-size="8" fill="#666">Reader · Monitoring · Log Analytics</text>

  <rect x="270" y="210" width="200" height="40" rx="6" fill="#fff" stroke="#d83b01" stroke-width="1" filter="url(#s)"/>
  <text x="370" y="230" text-anchor="middle" font-size="9" font-weight="600" fill="#d83b01">ACR + Alert Rules</text>
  <text x="370" y="242" text-anchor="middle" font-size="8" fill="#666">Container images · HTTP 5xx</text>

  <!-- ===== SCENARIOS ===== -->
  <text x="480" y="360" text-anchor="middle" font-size="16" font-weight="700" fill="#1a1a1a">Lab Scenarios</text>

  <!-- Scenario 1: IT Ops -->
  <rect x="15" y="375" width="300" height="145" rx="8" fill="#e8f4fd" stroke="#0078d4" stroke-width="1.5" filter="url(#s)"/>
  <text x="165" y="397" text-anchor="middle" font-size="12" font-weight="700" fill="#0078d4">Scenario 1: IT Operations</text>
  <text x="165" y="415" text-anchor="middle" font-size="10" fill="#666">No GitHub required</text>
  <text x="30" y="435" font-size="9" fill="#333">1. break-app.sh → memory leak → 500 errors</text>
  <text x="30" y="450" font-size="9" fill="#333">2. Agent: logs + KQL + runbook → root cause</text>
  <text x="30" y="465" font-size="9" fill="#333">3. Agent: restart app → verify recovery</text>
  <rect x="30" y="478" width="270" height="18" rx="3" fill="#d4edda" stroke="#107c10" stroke-width="0.7"/>
  <text x="165" y="491" text-anchor="middle" font-size="9" font-weight="600" fill="#107c10">IT Persona — Log Analysis + Remediation</text>
  <text x="30" y="513" font-size="8" fill="#666">+ Azure Monitor alert → autonomous investigation</text>

  <!-- Scenario 2: Developer -->
  <rect x="330" y="375" width="300" height="145" rx="8" fill="#e8f5e9" stroke="#107c10" stroke-width="1.5" filter="url(#s)"/>
  <text x="480" y="397" text-anchor="middle" font-size="12" font-weight="700" fill="#107c10">Scenario 2: Developer</text>
  <text x="480" y="415" text-anchor="middle" font-size="10" fill="#666">With GitHub — same break</text>
  <text x="345" y="435" font-size="9" fill="#333">1. Same break + same investigation</text>
  <text x="345" y="450" font-size="9" fill="#333">2. + Source code search → file:line refs</text>
  <text x="345" y="465" font-size="9" fill="#333">3. + GitHub issue with fix suggestion</text>
  <rect x="345" y="478" width="270" height="18" rx="3" fill="#d4edda" stroke="#107c10" stroke-width="0.7"/>
  <text x="480" y="491" text-anchor="middle" font-size="9" font-weight="600" fill="#107c10">Dev + IT Persona — Code RCA + Issue</text>
  <text x="345" y="513" font-size="8" fill="#666">+ Agent may create PR with fix</text>

  <!-- Scenario 3: Workflow -->
  <rect x="645" y="375" width="300" height="145" rx="8" fill="#fff3e0" stroke="#d83b01" stroke-width="1.5" filter="url(#s)"/>
  <text x="795" y="397" text-anchor="middle" font-size="12" font-weight="700" fill="#d83b01">Scenario 3: Automation</text>
  <text x="795" y="415" text-anchor="middle" font-size="10" fill="#666">With GitHub — scheduled task</text>
  <text x="660" y="435" font-size="9" fill="#333">1. Customer issues on GitHub fork</text>
  <text x="660" y="450" font-size="9" fill="#333">2. Scheduled task triages issues</text>
  <text x="660" y="465" font-size="9" fill="#333">3. Labels + classification + comments</text>
  <rect x="660" y="478" width="270" height="18" rx="3" fill="#fff3e0" stroke="#d83b01" stroke-width="0.7"/>
  <text x="795" y="491" text-anchor="middle" font-size="9" font-weight="600" fill="#d83b01">Any Persona — Workflow Automation</text>
  <text x="660" y="513" font-size="8" fill="#666">Bug · Performance · Feature · Question</text>

  <!-- Setup flow -->
  <rect x="15" y="540" width="930" height="130" rx="8" fill="#f0f0f0" stroke="#666" stroke-width="1" filter="url(#s)"/>
  <text x="480" y="562" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Setup (~10 min) → Explore (~5 min) → Break &amp; Investigate (~10 min) → Triage (~5 min)</text>

  <text x="30" y="585" font-size="10" fill="#333">1. git clone microsoft/sre-agent</text>
  <text x="30" y="602" font-size="10" fill="#333">2. cd labs/starter-lab</text>
  <text x="30" y="619" font-size="10" fill="#333">3. bash scripts/setup.sh</text>
  <text x="30" y="636" font-size="10" fill="#333">4. Open sre.azure.com → explore</text>

  <text x="350" y="585" font-size="10" fill="#333">5. break-app.sh → app broken</text>
  <text x="350" y="602" font-size="10" fill="#333">6. /agent → investigate prompt</text>
  <text x="350" y="619" font-size="10" fill="#333">7. Agent diagnoses + remediates</text>
  <text x="350" y="636" font-size="10" fill="#333">8. Check automated alert</text>

  <text x="670" y="585" font-size="10" fill="#333">9. create-sample-issues.sh</text>
  <text x="670" y="602" font-size="10" fill="#333">10. Run triage scheduled task</text>
  <text x="670" y="619" font-size="10" fill="#333">11. Check labels + comments</text>
  <text x="670" y="636" font-size="10" fill="#333">12. azd down --purge</text>

  <text x="480" y="665" text-anchor="middle" font-size="11" font-weight="600" fill="#0078d4">Total: ~40 minutes</text>
</svg>
