# Azure Developer CLI (azd) template for SRE Agent Lab
# Run: azd up
name: sre-agent-lab
metadata:
  template: sre-agent-lab@1.0.0

infra:
  provider: bicep
  path: infra

# No services block — container image is built in the cloud via ACR Tasks
# in the post-provision hook. No Docker Desktop needed on the lab machine.

hooks:
  preprovision:
    posix:
      shell: sh
      run: scripts/prereqs.sh
      interactive: true
    windows:
      shell: pwsh
      run: |
        if (-not (Get-Command bash -ErrorAction SilentlyContinue)) {
          Write-Error "bash not found. Install Git for Windows (https://git-scm.com/download/win)."
          exit 1
        }
        bash scripts/prereqs.sh
      interactive: true
  postprovision:
    posix:
      shell: sh
      run: scripts/post-provision.sh
      interactive: true
    windows:
      shell: pwsh
      run: |
        if (-not (Get-Command bash -ErrorAction SilentlyContinue)) {
          Write-Error "bash not found. Install Git for Windows (https://git-scm.com/download/win)."
          exit 1
        }
        bash scripts/post-provision.sh
      interactive: true
