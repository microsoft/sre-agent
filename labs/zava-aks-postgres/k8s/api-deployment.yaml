apiVersion: apps/v1
kind: Deployment
metadata:
  name: zava-api
  labels:
    app: zava-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: zava-api
  template:
    metadata:
      labels:
        app: zava-api
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: zava-workload-identity
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: api
          image: "${ACR_NAME}.azurecr.io/zava-api:latest"
          ports:
            - containerPort: 3001
          envFrom:
            - configMapRef:
                name: zava-config
          env:
            - name: APPLICATIONINSIGHTS_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: zava-secrets
                  key: APPLICATIONINSIGHTS_CONNECTION_STRING
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /livez
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /livez
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
