metadata:
  name: pod-incident-remediator
spec:
  instructions: subagents/pod-incident-remediator.instructions.md
  handoffDescription: Single-incident pod remediator (HTTP-triggered, one fix + one SNOW ticket)
  tools:
  - CreateServiceNowIncident
  - UpdateServiceNowWorkNotes
  - ResolveServiceNowIncident
  - LookupServiceNowIncident
  - GetActiveRevision
  - RemediateContainerApp
  agentType: Autonomous
  temperature: 0.2
  handoffs: []
  enableSkills: true
  allowedSkills:
  - config-regression-diagnosis
  - crash-regression-diagnosis
  - deployment-rollback
  - deployment-validation
  - disk-pressure-diagnosis
  - grid-status-diagnosis
  - meter-api-diagnosis
  - notification-svc-diagnosis
  - outage-api-diagnosis
  - perf-regression-diagnosis
  - plot-incident-metrics
  - pod-fleet-audit-deck
  - release-on-sre-fix
  - repo-routing
  - sre-agent-customizer
