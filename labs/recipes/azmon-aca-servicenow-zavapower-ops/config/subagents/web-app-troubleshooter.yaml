metadata:
  name: web-app-troubleshooter
spec:
  instructions: subagents/web-app-troubleshooter.instructions.md
  handoffDescription: 'Triage & remediate Azure web app issues (App Service / Container Apps / AKS web apps): 5xx, latency,
    availability, deployment regressions, dependency failures, resource pressure.'
  tools:
  - CreateServiceNowIncident
  - UpdateServiceNowWorkNotes
  - ResolveServiceNowIncident
  - LookupServiceNowIncident
  - UploadChartToServiceNow
  agentType: Autonomous
  temperature: 0.2
  handoffs: []
  enableSkills: true
  allowedSkills:
  - config-regression-diagnosis
  - crash-regression-diagnosis
  - deployment-rollback
  - deployment-validation
  - disk-pressure-diagnosis
  - grid-status-diagnosis
  - meter-api-diagnosis
  - notification-svc-diagnosis
  - outage-api-diagnosis
  - perf-regression-diagnosis
  - plot-incident-metrics
  - pod-fleet-audit-deck
  - release-on-sre-fix
  - repo-routing
  - sre-agent-customizer
