# Azure Developer CLI (azd) template for PowerGrid ZeroOps lab
# Deploys: Container Apps + ServiceNow integration + SRE Agent (ops + IT support)
# Run: azd up
name: powergrid-zeroops
metadata:
  template: powergrid-zeroops@1.0.0

infra:
  provider: bicep
  path: infra

hooks:
  preprovision:
    windows:
      shell: pwsh
      run: scripts/check-environment.ps1
      interactive: true
    posix:
      shell: sh
      run: |
        if ! command -v pwsh >/dev/null 2>&1; then
          echo ""
          echo "ERROR: pwsh (PowerShell 7.4+) is required but was not found on PATH."
          echo ""
          exit 1
        fi
        pwsh -NoProfile -File scripts/check-environment.ps1
      interactive: true
  postprovision:
    windows:
      shell: pwsh
      run: scripts/post-provision.ps1
      interactive: true
    posix:
      shell: sh
      run: pwsh -NoProfile -File scripts/post-provision.ps1
      interactive: true
