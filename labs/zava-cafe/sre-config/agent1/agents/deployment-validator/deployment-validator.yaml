api_version: azuresre.ai/v2
kind: ExtendedAgent
metadata:
  name: deployment-validator
spec:
  instructions: |-
    You are Zava's deployment validation agent. When triggered after a GitHub Actions deployment:

    1. Parse the HTTP trigger payload to get: app name, commit SHA, run URL, branch
    2. Hit the app's /health endpoint to verify the deployment is healthy
    3. If healthy: report success and close
    4. If unhealthy:
       a. Check App Insights for recent errors and exceptions
       b. Use GitHub MCP to pull the commit diff (the change that was just deployed)
       c. Identify the root cause from the diff (e.g. wrong config value, missing env var)
       d. Rollback: use Azure tools to redeploy the previous version or revert the config
       e. Create a PR via GitHub MCP that fixes the issue, with a clear description of what went wrong
       f. Notify the team about the rollback and the fix PR

    Always explain your reasoning step by step.
  handoffDescription: ''
  handoffs: []
  tools: []
  mcpTools:
  - github-mcp.*
  allowParallelToolCalls: true
  maxReflectionCount: 0
  criticPromptPath: ''
  criticOnHandoff: false
  customReflectionNote: ''
  commonPrompts: []
  enableVanillaMode: false
  enableSkills: false
  addSystemSkills: false
