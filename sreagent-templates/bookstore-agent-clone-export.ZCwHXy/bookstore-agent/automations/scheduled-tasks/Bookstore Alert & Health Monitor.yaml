metadata:
  name: Bookstore Alert & Health Monitor
spec:
  description: Checks for fired Azure Monitor alerts and overall health of the bookstore
    Container App and PostgreSQL every 15 minutes
  cronExpression: '*/15 * * * *'
  startTime: '2026-05-13T20:54:13.5090808Z'
  agentPrompt: "Autonomous Scheduled Run\n\nScope:\n- Subscription: cbf44432-7f45-4906-a85d-d2b14a1e8328\n\
    - Resource Group: rg-bookstore-demo\n- Container App: /subscriptions/cbf44432-7f45-4906-a85d-d2b14a1e8328/resourceGroups/rg-bookstore-demo/providers/Microsoft.App/containerApps/ca-bookstore-ixiytoaegn4xu\n\
    - PostgreSQL: /subscriptions/cbf44432-7f45-4906-a85d-d2b14a1e8328/resourceGroups/rg-bookstore-demo/providers/Microsoft.DBforPostgreSQL/flexibleServers/pg-ixiytoaegn4xu\n\
    - Log Analytics Workspace: law-bookstore-ixiytoaegn4xu (workspace ID: ceff0903-3ad5-4a5b-9e08-ae84db500098)\n\
    \nTime Window: Analyze ONLY last 15 minutes\n\nGoal: Detect and report on any\
    \ fired/active Azure Monitor alerts and check overall application health.\n\n\
    Steps:\n1. Check for fired/active metric alerts in rg-bookstore-demo:\n   - az\
    \ monitor metrics alert list --resource-group rg-bookstore-demo --subscription\
    \ cbf44432-7f45-4906-a85d-d2b14a1e8328\n   - Focus on alerts with currentSeverity\
    \ 0 or 1 that are in \"Fired\" state\n2. Check Container App health:\n   - Verify\
    \ revision is running and healthy via az containerapp revision list\n   - Check\
    \ replica count > 0\n3. Check PostgreSQL health:\n   - Verify server state is\
    \ Ready via az postgres flexible-server show\n4. Optionally check recent container\
    \ logs for errors:\n   - Query Log Analytics for error-level logs in last 15 minutes\
    \ if workspace has data\n\nConstraints: Max 10 API calls per execution. Read-only\
    \ operations only, no write operations.\n\nIdempotence: If all alerts are in \"\
    Resolved\" state, Container App is healthy with replicas running, and PostgreSQL\
    \ is Ready -> output \"All systems healthy. No active alerts.\"\n\nOutput Format:\n\
    - Overall Status: Healthy / Degraded / Critical\n- Active Alerts: list any fired\
    \ alerts with name, severity, and description\n- Container App: running status,\
    \ replica count, health state\n- PostgreSQL: state, CPU if available\n- Recommendations:\
    \ 1-3 actions if issues detected\n\nEscalation: If any Sev0 alert is fired, or\
    \ Container App has 0 replicas, or PostgreSQL is not Ready, mark as CRITICAL and\
    \ include \"Immediate attention required\" in output."
  createdBy: SREAgent
  status: Paused
  agentMode: autonomous
