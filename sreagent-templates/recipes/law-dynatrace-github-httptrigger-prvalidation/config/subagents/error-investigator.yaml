metadata:
  name: error-investigator
spec:
  instructions: subagents/error-investigator.instructions.md
  handoffDescription: Investigates application errors by correlating Dynatrace metrics,
    LAW logs, and deployment history to identify root cause
  handoffs: []
  allowedSkills:
  - investigate-app-errors
  tools:
  - RunAzCliReadCommands
  - QueryLogAnalyticsByWorkspaceId
  - ExecutePythonCode
  - PlotAreaChartWithCorrelation
  - PlotBarChart
  - FindConnectedGitHubRepo
  - dynatrace_execute-dql
  - dynatrace_create-dql
  - dynatrace_query-problems
  - dynatrace_get-entity-id
  - dynatrace_get-entity-name
  maxReflectionCount: 0
  customReflectionNote: ''
  commonPrompts: []
  enableVanillaMode: false
