# Required roles/credentials for the law-dynatrace-httptrigger recipe.
# deploy.sh processes this after the UAMI is created.

roles:
  # GitHub repos — prints OAuth URL or uses GITHUB_PAT env var
  - name: GitHub OAuth
    type: manual
    instructions: |
      To connect GitHub repos, either:
      1. Set GITHUB_PAT env var before deploy: export GITHUB_PAT=ghp_xxx
      2. Or after deploy, open the OAuth URL printed by apply-extras.sh

  # Dynatrace MCP — requires bearer token in connectors.secrets.env
  - name: Dynatrace MCP
    type: manual
    instructions: |
      Create a Dynatrace API token with scopes: entities.read, events.read, metrics.read, problems.read
      Save it in connectors.secrets.env:
        DYNATRACE_BEARER_TOKEN=dt0c01.xxx
